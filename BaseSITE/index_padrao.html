<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual da Operação - GO</title>
    <link rel="icon" type="image/png" href="https://entreego.com.br/wp-content/uploads/2023/12/logo-vertical-1.png?v=2">
    <link rel="shortcut icon" type="image/png" href="https://entreego.com.br/wp-content/uploads/2023/12/logo-vertical-1.png?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap&font-display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"></noscript>
    <style>
        :root {
            --azul-escuro: #0F1849; --azul-principal: #2C67EA; --azul-intermediario: #1B3FAC;
            --menta-viva: #2CEABC; --menta-suave: #B4FFED; --azul-gelo: #B4E4FF; --branco: #ffffff;
            --space-xs:8px;--space-sm:16px;--space-md:24px;--space-lg:40px;--space-xl:64px;--space-2xl:96px;
            --radius-sm:10px;--radius-md:16px;--radius-lg:24px;--radius-full:9999px;
            --transition-fast:0.18s ease;--transition-base:0.3s ease;--transition-slow:0.5s ease;
            --shadow-glow:0 0 20px rgba(44,234,188,0.18);--shadow-card:0 8px 32px rgba(0,0,0,0.28);
            --shadow-card-hover:0 16px 48px rgba(44,234,188,0.14),0 0 0 1px rgba(44,234,188,0.12);
        }
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;}
        body{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;background:#080e2e;color:var(--branco);min-height:100vh;overflow-x:hidden;line-height:1.6;position:relative;}
        body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(44,103,234,0.45) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(27,63,172,0.4) 0%,transparent 55%),#080e2e;pointer-events:none;}
        body::after{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(circle 500px at 15% 25%,rgba(44,234,188,0.055) 0%,transparent 70%),radial-gradient(circle 700px at 80% 70%,rgba(44,103,234,0.07) 0%,transparent 70%);pointer-events:none;opacity:0;transition:opacity 1s ease;}
        body.site-loaded::after{opacity:1;animation:blobDrift 18s ease-in-out infinite alternate;}
        @keyframes blobDrift{0%{background-position:0% 0%;}50%{filter:hue-rotate(5deg);}100%{background-position:100% 100%;}}
        .dot-grid{position:fixed;inset:0;z-index:0;background-image:radial-gradient(circle,rgba(180,228,255,0.07) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);opacity:0;transition:opacity 0.8s ease;}
        body.site-loaded .dot-grid{opacity:1;}
        header,main,#login-container,#loader{position:relative;z-index:1;}
        ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(44,234,188,0.28);border-radius:var(--radius-full);}::-webkit-scrollbar-thumb:hover{background:rgba(44,234,188,0.55);}
        .reveal{opacity:0;transform:translateY(28px);transition:opacity 0.65s cubic-bezier(.4,0,.2,1),transform 0.65s cubic-bezier(.4,0,.2,1);}
        .reveal.revealed{opacity:1;transform:translateY(0);}
        .reveal-delay-1{transition-delay:0.08s;}.reveal-delay-2{transition-delay:0.16s;}.reveal-delay-3{transition-delay:0.24s;}.reveal-delay-4{transition-delay:0.32s;}
        .text-neon{color:var(--menta-viva);text-shadow:0 0 16px rgba(44,234,188,0.4);}.text-muted{color:var(--azul-gelo);opacity:0.85;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .glass-panel{background:rgba(13,20,65,0.8);border:1px solid rgba(44,234,188,0.13);box-shadow:var(--shadow-card),0 1px 0 rgba(255,255,255,0.04) inset;border-radius:var(--radius-lg);transition:border-color var(--transition-base),box-shadow var(--transition-base),transform var(--transition-base);overflow:visible;position:relative;}
        @supports (backdrop-filter:blur(1px)){.glass-panel{background:rgba(13,20,65,0.62);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}}
        .glass-panel::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,0.045) 50%,transparent 70%);background-size:200% 100%;background-position:-100% 0;transition:background-position 0.55s ease;pointer-events:none;border-radius:inherit;z-index:0;overflow:hidden;clip-path:inset(0 round var(--radius-lg));}
        .glass-panel:hover::after{background-position:200% 0;}
        .glass-panel>*{position:relative;z-index:1;}
        .glass-panel:hover:not(.flip-front):not(.flip-back){border-color:rgba(44,234,188,0.38);box-shadow:var(--shadow-card-hover);transform:translateY(-4px);}
        .icon-glow{width:48px;height:48px;min-width:48px;background:rgba(44,234,188,0.1);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:var(--menta-viva);box-shadow:0 0 16px rgba(44,234,188,0.1) inset;font-size:22px;font-weight:700;}
        #loader{position:fixed;inset:0;background:#080e2e;z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:0;transition:opacity 0.5s ease;}
        .loader-logo{width:72px;height:72px;margin-bottom:28px;opacity:0;transform:translateY(12px);animation:loaderLogoIn 0.5s 0.1s ease forwards;}
        @keyframes loaderLogoIn{to{opacity:1;transform:translateY(0);}}
        .loader-label{font-size:11px;font-weight:700;letter-spacing:3px;color:rgba(180,228,255,0.5);text-transform:uppercase;margin-bottom:20px;opacity:0;animation:loaderLogoIn 0.5s 0.3s ease forwards;}
        .loader-bar-wrap{width:180px;height:2px;background:rgba(44,234,188,0.1);border-radius:99px;overflow:hidden;opacity:0;animation:loaderLogoIn 0.4s 0.4s ease forwards;}
        .loader-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--azul-principal),var(--menta-viva));border-radius:99px;animation:loaderProgress 1.8s 0.5s cubic-bezier(.4,0,.2,1) forwards;box-shadow:0 0 12px rgba(44,234,188,0.6);}
        @keyframes loaderProgress{0%{width:0%}40%{width:55%}70%{width:78%}90%{width:90%}100%{width:100%}}
        header{background:rgba(8,14,46,0.92);padding:0 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(44,234,188,0.08);min-height:68px;gap:var(--space-md);box-shadow:0 1px 0 rgba(44,234,188,0.06),0 4px 24px rgba(0,0,0,0.3);}
        @supports (backdrop-filter:blur(1px)){header{backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);background:rgba(8,14,46,0.88);}}
        header::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(44,234,188,0.4),rgba(44,103,234,0.4),transparent);}
        .logo-box{display:flex;align-items:center;gap:12px;flex-shrink:0;text-decoration:none;}
        .logo-img{height:40px;width:auto;object-fit:contain;}
        .logo-texto{font-weight:800;font-size:17px;letter-spacing:-0.3px;color:var(--branco);white-space:nowrap;}
        nav{position:relative;}
        .menu{list-style:none;display:flex;gap:2px;align-items:center;position:relative;}
        .menu-indicator{position:absolute;top:0;left:0;height:100%;background:rgba(44,234,188,0.1);border-radius:var(--radius-full);border:1px solid rgba(44,234,188,0.25);transition:transform 0.35s cubic-bezier(.4,0,.2,1),width 0.35s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:0;opacity:0;}
        .menu li{position:relative;z-index:1;}
        .menu a{text-decoration:none;color:rgba(180,228,255,0.75);font-weight:600;font-size:14px;transition:color var(--transition-fast),background var(--transition-fast);padding:7px 14px;border-radius:var(--radius-full);white-space:nowrap;letter-spacing:0.1px;display:block;position:relative;z-index:1;}
        .menu a:hover{color:var(--menta-viva);background:rgba(44,234,188,0.08);}
        .menu a.active-link{color:var(--menta-viva);}
        /* FIX 2: links de gestão — destacados mas não "sempre ativos" */
        .menu a.menu-gestao-link{color:var(--menta-viva);font-weight:800;}
        .menu a:focus-visible{outline:2px solid var(--menta-viva);outline-offset:2px;}
        .search-box{flex:1;max-width:340px;min-width:0;position:relative;}
        .search-input{width:100%;padding:10px 96px 10px 18px;border-radius:var(--radius-full);border:1px solid rgba(44,234,188,0.18);background:rgba(15,24,73,0.55);color:var(--branco);font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:14px;font-weight:500;outline:none;transition:border-color var(--transition-base),box-shadow var(--transition-base);}
        .search-input::placeholder{color:var(--azul-gelo);opacity:0.5;}
        .search-input:focus{border-color:rgba(44,234,188,0.5);box-shadow:0 0 0 3px rgba(44,234,188,0.08);}
        .search-inside{position:absolute;right:10px;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:4px;}
        .search-counter{color:var(--azul-gelo);font-size:11px;font-weight:600;opacity:0.65;min-width:28px;text-align:center;}
        .search-inside button{background:none;border:none;color:var(--menta-viva);cursor:pointer;font-size:13px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:6px;opacity:0.65;transition:opacity var(--transition-fast),background var(--transition-fast);}
        .search-inside button:hover{opacity:1;background:rgba(44,234,188,0.12);}
        section{padding:var(--space-xl) 5%;max-width:1320px;width:100%;margin:0 auto;position:relative;}
        main#main-content{width:100%;display:block;}
        .section-header{text-align:center;margin-bottom:var(--space-xl);max-width:720px;margin-left:auto;margin-right:auto;}
        .section-title{font-size:clamp(28px,4vw,42px);font-weight:800;margin-bottom:12px;letter-spacing:-1px;line-height:1.12;}
        .section-desc{font-size:16px;color:var(--azul-gelo);line-height:1.7;font-weight:400;opacity:0.85;}
        .grid-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:var(--space-md);align-items:stretch;}
        #promoContent .grid-container{justify-content:center;}
        #promoContent .flip-card{max-width:380px;}
        #promoContent .grid-container{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));align-items:stretch;}
        .hero{padding-top:var(--space-2xl);padding-left:5%;padding-right:5%;text-align:center;min-height:72vh;display:flex;align-items:center;justify-content:center;position:relative;max-width:100% !important;width:100%;box-sizing:border-box;}
        .hero::before{content:'';position:absolute;top:10%;left:50%;transform:translateX(-50%);width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(44,103,234,0.18) 0%,transparent 65%);pointer-events:none;animation:heroOrb 6s ease-in-out infinite alternate;}
        @keyframes heroOrb{from{transform:translateX(-50%) scale(1);opacity:0.7;}to{transform:translateX(-50%) scale(1.12);opacity:1;}}
        .hero-content{max-width:860px;width:100%;margin:0 auto;position:relative;text-align:center;}
        .hero h1{font-size:clamp(52px,9vw,96px);font-weight:800;line-height:1.04;margin-bottom:20px;letter-spacing:-3px;}
        .hero span{color:var(--menta-viva);text-shadow:0 0 40px rgba(44,234,188,0.5);}
        .hero-subtitle{font-size:clamp(18px,2.5vw,26px);font-weight:400;color:var(--azul-gelo);margin-bottom:var(--space-lg);opacity:0.85;letter-spacing:-0.2px;}
        .hero-badge{display:inline-block;padding:10px 28px;border:1px solid rgba(44,234,188,0.4);border-radius:var(--radius-full);color:var(--menta-viva);font-weight:700;text-transform:uppercase;letter-spacing:2.5px;font-size:12px;background:rgba(44,234,188,0.06);animation:badgePulse 3s ease-in-out infinite;}
        @keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 rgba(44,234,188,0.15);}50%{box-shadow:0 0 0 8px rgba(44,234,188,0);}}
        .card-standard{padding:var(--space-md);display:flex;flex-direction:column;height:100%;}
        .card-standard h3{font-size:18px;font-weight:700;margin:var(--space-sm) 0 8px;line-height:1.3;}
        .card-standard p{flex-grow:1;line-height:1.7;color:var(--azul-gelo);overflow-wrap:anywhere;word-break:break-word;font-size:14px;}
        .elite-card-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;}
        .progress-container{margin-top:var(--space-md);}
        .progress-info{display:flex;justify-content:space-between;margin-bottom:8px;font-weight:700;font-size:13px;}
        .progress-bar{height:8px;background:rgba(255,255,255,0.08);border-radius:var(--radius-full);overflow:hidden;}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--menta-viva),#00d4a8);width:85%;box-shadow:0 0 10px rgba(44,234,188,0.5);border-radius:var(--radius-full);}
        .acelerador-card{border-color:rgba(44,234,188,0.45);position:relative;overflow:hidden;overflow-wrap:anywhere;word-break:break-word;}
        .acelerador-badge{position:absolute;top:0;left:50%;transform:translateX(-50%);background:var(--menta-viva);color:var(--azul-escuro);padding:5px 22px;font-weight:800;font-size:11px;letter-spacing:1.5px;border-bottom-left-radius:12px;border-bottom-right-radius:12px;text-transform:uppercase;}
        .equation-box{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.04);padding:14px 18px;border-radius:var(--radius-md);margin-top:var(--space-md);flex-wrap:wrap;border:1px solid rgba(44,234,188,0.1);}
        .eq-result{background:rgba(44,234,188,0.18);padding:7px 14px;border-radius:8px;color:var(--menta-viva);font-weight:700;font-size:14px;}
        .praca-divider{font-size:20px;font-weight:800;margin:var(--space-lg) 0 var(--space-sm);color:var(--menta-viva);border-left:3px solid var(--menta-viva);padding-left:14px;text-transform:uppercase;letter-spacing:1px;}
        .img-container{width:100%;overflow:hidden;border-radius:var(--radius-sm);background:rgba(0,0,0,0.15);}
        .responsive-img{width:100%;height:auto;display:block;transition:transform var(--transition-base);}
        .responsive-img:hover{transform:scale(1.02);}
        .dedicado-card{width:100%;padding:var(--space-md) var(--space-sm);display:flex;flex-direction:column;align-items:center;text-align:center;gap:12px;position:relative;overflow:visible;border-radius:var(--radius-lg);}
        .dedicado-info{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;}
        .dedicado-img-box{width:108px;height:108px;margin:0 auto;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,0.04);}
        .dedicado-img-box img{max-width:100%;max-height:100%;object-fit:contain;}
        .dedicado-info h3{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4;}
        .info-horario{white-space:pre-line;line-height:1.6;color:var(--azul-gelo);font-size:13px;opacity:0.9;}
        .info-endereco{font-size:11px;opacity:0.55;color:var(--azul-gelo);}
        .dedicado-card-wrapper{display:flex;flex-direction:column;align-items:stretch;height:100%;}
        .dedicado-card-wrapper .glass-panel.dedicado-card{flex:1;}
        .proc-intro{text-align:center;margin:var(--space-md) 0;padding:18px var(--space-md);background:rgba(44,234,188,0.06);border:1px solid rgba(44,234,188,0.18);border-radius:var(--radius-md);color:var(--azul-gelo);font-size:15px;line-height:1.7;}
        .proc-important{margin-top:var(--space-lg);padding:var(--space-md);background:rgba(44,234,188,0.05);border:1px solid rgba(44,234,188,0.22);border-radius:var(--radius-lg);text-align:center;}
        .proc-important h3{color:var(--menta-viva);font-size:20px;font-weight:700;margin-bottom:12px;}
        .proc-important p{color:var(--azul-gelo);margin-bottom:6px;font-size:14px;}
        .promo-text{white-space:pre-line;line-height:1.7;max-width:520px;font-size:14px;}
        .flip-front .img-container{position:relative;flex-shrink:0;width:100%;overflow:hidden;}
        .flip-front.glass-panel.card-standard{display:flex;flex-direction:column;overflow:hidden;}
        .flip-front h3{margin-top:var(--space-sm);font-size:16px;font-weight:700;line-height:1.3;padding:0 2px;}
        .flip-front .promo-text{flex-grow:1;overflow-wrap:anywhere;word-break:break-word;}
        .flip-back.glass-panel.card-standard{overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:var(--space-md);gap:12px;}
        .flip-hint{font-size:11px;font-weight:600;color:var(--menta-viva);opacity:0.6;text-align:center;letter-spacing:0.5px;margin-top:auto;padding-top:8px;}
        .accordion-item{margin-bottom:16px;border-radius:var(--radius-md);overflow:hidden;border:1px solid rgba(44,234,188,0.1);background:rgba(15,24,73,0.48);transition:border-color var(--transition-base),box-shadow var(--transition-base);}
        @supports (backdrop-filter:blur(1px)){.accordion-item{backdrop-filter:blur(12px);}}
        .accordion-item:hover{border-color:rgba(44,234,188,0.38);}
        .accordion-item.active{border-color:rgba(44,234,188,0.65);box-shadow:0 0 28px rgba(44,234,188,0.1);}
        .accordion-header{display:flex;align-items:center;gap:14px;padding:20px var(--space-md);cursor:pointer;user-select:none;transition:background var(--transition-fast);}
        .accordion-header:hover{background:rgba(44,234,188,0.04);}
        .accordion-icon{display:none;}
        .accordion-title-box{flex:1;min-width:0;}
        .accordion-title-box h3{font-size:17px;font-weight:700;color:var(--branco);margin-bottom:3px;line-height:1.35;}
        .accordion-title-box p{font-size:13px;color:var(--azul-gelo);opacity:0.65;}
        .accordion-arrow{font-size:18px;color:var(--menta-viva);transition:transform var(--transition-base);flex-shrink:0;}
        .accordion-item.active .accordion-arrow{transform:rotate(180deg);}
        .accordion-body{max-height:0;overflow:hidden;transition:max-height 0.45s ease,padding var(--transition-base);padding:0 var(--space-md);}
        .accordion-item.active .accordion-body{max-height:2400px;padding:0 var(--space-md) var(--space-md);}
        .accordion-body ul{list-style:none;padding:0;}
        .accordion-body ul li{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--azul-gelo);font-size:14px;display:flex;align-items:flex-start;gap:10px;line-height:1.6;}
        .accordion-body ul li:last-child{border-bottom:none;}
        .accordion-body ul li::before{content:'';display:none;}
        .accordion-alert{margin-top:14px;padding:13px 16px;background:rgba(44,234,188,0.06);border-left:3px solid var(--menta-viva);border-radius:0 var(--radius-sm) var(--radius-sm) 0;color:var(--azul-gelo);font-size:13px;line-height:1.6;}
        .accordion-alert strong{color:var(--menta-viva);}
        .dedicado-accordion{margin-bottom:16px;border-radius:var(--radius-md);overflow:visible;border:1px solid rgba(44,234,188,0.14);background:rgba(15,24,73,0.52);transition:border-color var(--transition-base);}
        @supports (backdrop-filter:blur(1px)){.dedicado-accordion{backdrop-filter:blur(10px);}}
        .dedicado-accordion:hover{border-color:rgba(44,234,188,0.36);}
        .dedicado-header{display:flex;justify-content:space-between;align-items:center;padding:18px var(--space-md);cursor:pointer;user-select:none;transition:background var(--transition-fast);border-radius:var(--radius-md);}
        .dedicado-header:hover{background:rgba(44,234,188,0.04);}
        .dedicado-title{font-size:18px;font-weight:800;color:var(--menta-viva);text-transform:uppercase;letter-spacing:0.5px;}
        .dedicado-arrow{font-size:16px;color:var(--menta-viva);transition:transform var(--transition-base);}
        .dedicado-accordion.active .dedicado-arrow{transform:rotate(180deg);}
        .dedicado-body{max-height:0;overflow:visible;transition:max-height 0.55s cubic-bezier(.4,0,.2,1),opacity var(--transition-slow);padding:0 var(--space-md);opacity:0;clip-path:inset(0);}
        .dedicado-accordion.active .dedicado-body{max-height:2000px;padding:16px var(--space-md) var(--space-md);opacity:1;clip-path:inset(-40px -20px -40px -20px);}
        @keyframes glowBombando{from{box-shadow:0 0 18px rgba(0,255,200,0.8);}to{box-shadow:0 0 32px rgba(0,255,200,1);}}
        @keyframes glowTop{from{box-shadow:0 0 18px rgba(0,170,255,0.8);}to{box-shadow:0 0 32px rgba(0,170,255,1);}}
        @keyframes glowPromocao{from{box-shadow:0 0 18px rgba(50,210,100,0.75);}to{box-shadow:0 0 32px rgba(20,150,60,1);}}
        @keyframes pulseBadge{from{opacity:0.85;}to{opacity:1;}}
        .dedicado-card-wrapper.destaque-bombando .dedicado-card{animation:glowBombando 1s infinite alternate;}
        .dedicado-card-wrapper.destaque-top .dedicado-card{animation:glowTop 1s infinite alternate;}
        .dedicado-card-wrapper.destaque-promocao .dedicado-card{animation:glowPromocao 1s infinite alternate;}

        #back-to-top{position:fixed;bottom:32px;right:32px;width:44px;height:44px;border-radius:50%;background:rgba(13,20,65,0.9);border:1px solid rgba(44,234,188,0.35);color:var(--menta-viva);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,0.4),0 0 12px rgba(44,234,188,0.1);opacity:0;transform:translateY(16px);transition:opacity 0.3s ease,transform 0.3s ease,border-color 0.2s ease,box-shadow 0.2s ease;pointer-events:none;}
        @supports (backdrop-filter:blur(1px)){#back-to-top{backdrop-filter:blur(12px);}}
        #back-to-top.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
        #back-to-top:hover{border-color:var(--menta-viva);box-shadow:0 4px 24px rgba(44,234,188,0.25),0 0 0 4px rgba(44,234,188,0.06);transform:translateY(-3px);}
        .hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:none;border:1px solid rgba(44,234,188,0.2);border-radius:8px;padding:8px;flex-shrink:0;}
        .hamburger span{display:block;width:100%;height:1.5px;background:var(--azul-gelo);border-radius:2px;transition:transform 0.3s ease,opacity 0.3s ease,background 0.2s ease;transform-origin:center;}
        .hamburger.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);background:var(--menta-viva);}
        .hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0);}
        .hamburger.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);background:var(--menta-viva);}
        .mobile-nav{display:none;position:fixed;top:0;left:0;right:0;background:rgba(8,12,40,0.97);z-index:99;padding:88px 6% 32px;border-bottom:1px solid rgba(44,234,188,0.1);flex-direction:column;gap:4px;transform:translateY(-110%);transition:transform 0.4s cubic-bezier(.4,0,.2,1);}
        @supports (backdrop-filter:blur(1px)){.mobile-nav{backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);}}
        .mobile-nav.open{transform:translateY(0);}
        .mobile-nav a{display:block;padding:14px 16px;color:rgba(180,228,255,0.75);text-decoration:none;font-size:17px;font-weight:600;border-radius:var(--radius-md);transition:all 0.18s ease;border:1px solid transparent;}
        .mobile-nav a:hover,.mobile-nav a:focus{color:var(--menta-viva);background:rgba(44,234,188,0.06);border-color:rgba(44,234,188,0.15);padding-left:22px;}
        @keyframes skeletonPulse{0%,100%{opacity:0.4;}50%{opacity:0.9;}}
        @keyframes skeletonShimmer{from{background-position:-200% 0;}to{background-position:200% 0;}}
        .skeleton-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:var(--space-md);}
        .skeleton-card{background:rgba(15,24,73,0.5);border:1px solid rgba(44,234,188,0.08);border-radius:var(--radius-lg);padding:var(--space-md);display:flex;flex-direction:column;gap:14px;min-height:200px;animation:skeletonPulse 1.6s ease-in-out infinite;}
        .skeleton-line{border-radius:6px;background:linear-gradient(90deg,rgba(44,234,188,0.07),rgba(44,103,234,0.1),rgba(44,234,188,0.07));background-size:200% 100%;animation:skeletonPulse 1.6s ease-in-out infinite,skeletonShimmer 2s linear infinite;}
        .skeleton-line.h-title{height:22px;width:60%;}.skeleton-line.h-text{height:14px;width:90%;}.skeleton-line.h-text-sm{height:14px;width:70%;}.skeleton-line.h-img{height:120px;width:100%;border-radius:var(--radius-md);}
        .content-fade-out{animation:contentFadeOut 0.2s ease forwards;}.content-fade-in{animation:contentFadeIn 0.35s ease forwards;}
        @keyframes contentFadeOut{to{opacity:0;transform:translateY(6px);}}
        @keyframes contentFadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
        @keyframes shakeForm{0%,100%{transform:translateX(0);}15%{transform:translateX(-8px);}30%{transform:translateX(8px);}45%{transform:translateX(-6px);}60%{transform:translateX(6px);}75%{transform:translateX(-3px);}90%{transform:translateX(3px);}}
        .login-box.shake{animation:shakeForm 0.55s cubic-bezier(.4,0,.2,1);}
        @keyframes successPop{0%{transform:scale(0.5);opacity:0;}60%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);opacity:1;}}
        #login-success-icon{display:none;font-size:48px;animation:successPop 0.5s cubic-bezier(.4,0,.2,1) forwards;margin-bottom:8px;}
        .menu-has-sub{position:relative;}
        .menu-submenu{opacity:0;visibility:hidden;pointer-events:none;position:absolute;top:calc(100% + 4px);left:50%;transform:translateX(-50%) translateY(-4px);margin-top:0;background:#111c52;min-width:200px;border-radius:var(--radius-md);border:1px solid rgba(44,234,188,0.28);box-shadow:0 12px 32px rgba(0,0,0,0.5);padding:6px 0;z-index:200;transition:opacity 0.18s ease,transform 0.18s ease,visibility 0s linear 0.18s;}
        @supports (backdrop-filter:blur(1px)){.menu-submenu{backdrop-filter:blur(16px);}}
        .menu-has-sub::after{content:'';position:absolute;top:100%;left:0;width:100%;height:12px;z-index:199;}
        .menu-has-sub:hover .menu-submenu,.menu-submenu:hover{opacity:1;visibility:visible;pointer-events:auto;transform:translateX(-50%) translateY(0);transition:opacity 0.18s ease,transform 0.18s ease,visibility 0s linear 0s;}
        .menu-submenu a{display:block;padding:10px 18px;color:rgba(180,228,255,0.8);font-size:13px;font-weight:600;border-radius:0;white-space:nowrap;transition:all 0.15s ease;}
        .menu-submenu a:hover{color:var(--menta-viva);background:rgba(44,234,188,0.1);padding-left:22px;}
        .lazy-loading-hint{text-align:center;padding:32px 0;color:var(--azul-gelo);font-size:13px;opacity:0.45;display:flex;align-items:center;justify-content:center;gap:10px;}
        .lazy-spin{width:14px;height:14px;border:2px solid rgba(44,234,188,0.2);border-top-color:var(--menta-viva);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
        /* FIX 1: estado visual do botão Atualizar durante refresh */
        #btnAtualizarMetricas.loading{opacity:0.6;cursor:not-allowed;pointer-events:none;}
    </style>
</head>
<body>
    <div id="read-progress"></div>
    <button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Voltar ao topo">↑</button>
    <div id="toast-container"></div>
    <div class="dot-grid" aria-hidden="true"></div>
    <nav class="mobile-nav" id="mobileNav"></nav>

    <div id="login-container">
        <div class="login-box" id="loginBox">
            <div id="login-success-icon">✅</div>
            <img src="https://i.imgur.com/ZEox7rf.png" alt="Logo EntreGô" id="loginLogo" loading="eager" fetchpriority="high">
            <h2>Bem-vindo de volta</h2>
            <p class="login-subtitle">Acesso restrito à equipe operacional</p>
            <div class="login-field">
                <input type="text" id="loginUser" class="login-input" placeholder=" " autocomplete="username">
                <label for="loginUser">Usuário</label>
            </div>
            <div class="login-field">
                <input type="password" id="loginPass" class="login-input" placeholder=" " autocomplete="current-password">
                <label for="loginPass">Senha</label>
            </div>
            <label class="login-remember">
                <input type="checkbox" id="lembrarMe"> Lembrar de mim
            </label>
            <button id="btnEntrar" class="login-btn ripple-host" onclick="fazerLogin()">
                <span id="txtBtn">Entrar</span>

            <div id="login-error"></div>
        </div>
    </div>

    <div id="loader" style="display:none;">
        <img src="https://i.imgur.com/ZEox7rf.png" alt="Logo" class="loader-logo" loading="eager">
        <p class="loader-label">Sincronizando</p>
        <div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div>
    </div>

    <header id="main-header" style="display:none;">
        <div class="logo-box">
            <img class="logo-img" src="https://i.imgur.com/ZEox7rf.png" alt="Logo" loading="eager">
            <span class="logo-texto">Manual Operacional</span>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar no manual..." oninput="debounceFiltro(this.value)"/>
            <div class="search-inside">
                <span class="search-counter" id="searchCounter"></span>
                <button onclick="navegarResultado(-1)" title="Anterior">▲</button>
                <button onclick="navegarResultado(1)" title="Próximo">▼</button>
            </div>
        </div>
        <nav>
            <ul class="menu" id="mainMenu">
                <div class="menu-indicator" id="menuIndicator"></div>
                <li><a href="#home">Home</a></li>
                <li><a href="#elite">Elite</a></li>
                <li><a href="#promocoes">Promoções</a></li>
                <li class="menu-has-sub" style="position:relative;">
                    <a href="#dedicado" class="menu-link-with-arrow" id="dedicadoMenuLink">Dedicado <span style="font-size:10px;opacity:0.7;">▼</span></a>
                    <div class="menu-submenu" id="menuSubmenu">
                        <a href="garantido.html" style="color:var(--menta-viva);font-weight:700;">↗ Garantido (página dedicada)</a>
                    </div>
                </li>
                <li><a href="#mapas">Mapas</a></li>
                <li><a href="#cadastro">Cadastro</a></li>
                <li><a href="#procedimentos">Procedimentos</a></li>
            </ul>
        </nav>
        <button class="hamburger" id="hamburgerBtn" aria-label="Menu" onclick="toggleMobileNav()">
            <span></span><span></span><span></span>
        </button>
    </header>

    <main id="main-content" style="display:none;"></main>

    <div id="imgModal" class="img-modal" onclick="fecharZoom(event)">
        <div class="img-modal-content" onclick="event.stopPropagation()">
            <img id="imgZoom" class="img-zoom" alt="Imagem ampliada">
            <div class="zoom-controls">
                <button onclick="zoomMais()" title="Zoom +">+</button>
                <button onclick="zoomMenos()" title="Zoom −">−</button>
                <button onclick="fecharZoom()" title="Fechar">✕</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script>
    var dadosPromocoes = [], pracasDisponiveis = [], dadosDedicado = [];
    var modaisDisponiveis = [], dadosMapas = [], pracasMapasDisponiveis = [], dadosMetricas = [];

    function showToast(msg, type, duration) {
        type = type||'error'; duration = duration||4000;
        var icons = {error:'⚠️',success:'✅',info:'ℹ️'};
        var t = document.createElement('div');
        t.className = 'toast toast-'+type;
        t.innerHTML = '<span class="toast-icon">'+icons[type]+'</span><span>'+msg+'</span>';
        document.getElementById('toast-container').appendChild(t);
        setTimeout(function(){ t.classList.add('toast-out'); setTimeout(function(){ if(t.parentNode) t.remove(); },320); }, duration);
    }

    function mostrarErro(msg) {
        showToast(msg,'error');
        var e = document.getElementById('login-error');
        if(e) e.innerText = msg;
        var box = document.getElementById('loginBox');
        if(box){ box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake'); setTimeout(function(){ box.classList.remove('shake'); },600); }
    }

/* --- INÍCIO REFATORAÇÃO DE PERFORMANCE (DEBOUNCE E TEMPLATES) --- */
    let _filtroDebounceTimer;
    function debounceFiltro(valor) {
        clearTimeout(_filtroDebounceTimer);
        _filtroDebounceTimer = setTimeout(function() {
            filtrarConteudo(valor);
        }, 300); // Alivia a sobrecarga de recálculo da página
    }


    /* --- FIM REFATORAÇÃO DE PERFORMANCE --- */

    function restaurarBotaoLogin() {
        var b = document.getElementById('btnEntrar');
        if(b){ b.disabled=false; document.getElementById('txtBtn').innerText='Entrar'; document.getElementById('spinBtn').style.display='none'; }
    }

    async function carregarDadosCompletos() {
        try {
            // Check user profile
            const { data: { session } } = await supabaseClient.auth.getSession();
            let isGestao = false;
            if (session && session.user && session.user.email) {
                const email = session.user.email.toLowerCase();
                isGestao = email.includes('gestao'); // Fallback if no table
                try {
                    const { data: perfilData } = await supabaseClient.from('perfis').select('*').eq('email', email).single();
                    if (perfilData && perfilData.perfil) {
                        isGestao = (perfilData.perfil.toLowerCase() === 'gestao');
                    }
                } catch(e) {
                    console.log('Tabela perfis não encontrada ou sem acesso. Usando verificação por email.');
                }
            }

            const [hc, el, pr, de, ma, ca, pe] = await Promise.all([
                supabaseClient.from('home_config').select('*').order('ordem', { ascending: true }),
                supabaseClient.from('elite').select('*').order('ordem', { ascending: true }),
                supabaseClient.from('promocoes').select('*').order('ordem', { ascending: true }),
                supabaseClient.from('dedicado').select('*'),
                supabaseClient.from('mapas').select('*').order('ordem', { ascending: true }),
                supabaseClient.from('cadastro').select('*'),
                supabaseClient.from('procedimentos').select('*').order('ordem', { ascending: true })
            ]);

            // Debug errors or empty data
            if(hc.error) console.error('Erro Home_Config:', hc.error);
            if(el.error) console.error('Erro Elite:', el.error);
            if(pr.error) console.error('Erro Promocoes:', pr.error);
            if(pe.error) console.error('Erro Procedimentos:', pe.error);
            
            
            // Função para garantir as chaves no formato esperado (PascalCase) e valores nulos como string vazia para evitar erro de undefined
            const mapKeys = (arr) => {
                if(!arr) return [];
                const keyMap = {
                    'tipo':'Tipo','titulo':'Titulo','título':'Titulo','texto':'Texto','imagem_url':'Imagem_URL',
                    'subtitulo':'Subtitulo','subtítulo':'Subtitulo','ordem':'ordem','horario_valores':'Horario_Valores',
                    'horário_valores':'Horario_Valores', 'horário / valores':'Horario_Valores',
                    'restaurante':'Restaurante','unidade':'Unidade','endereco_cep':'Endereco_CEP', 'endereço':'Endereco_CEP',
                    'destaque':'Destaque','modal':'Modal','praca':'Praca','praça':'Praca',
                    'subpraca':'Subpraca','subpraça':'Subpraca',
                    'turno':'Turno','recebe?':'RECEBE?','detalhamento':'Detalhamento','nomes':'Nomes',
                    'nome':'Nome','uuid':'UUID','data':'Data','status':'Status','regiao':'Regiao','região':'Regiao',
                    'link_mapa':'Link_Mapa','link mapa':'Link_Mapa', 'texto_verso':'Texto_Verso', 'mecânica':'Texto_Verso',
                    'link':'Link','intencao':'Intencao','intenção':'Intencao',
                    'texto_info':'Texto_Info','secao':'Secao','seção':'Secao'
                };
                return arr.map(obj => {
                    let n = {};
                    for(let k in obj) {
                        n[k] = obj[k];
                        let mapped = keyMap[k.toLowerCase().trim()] || (k.charAt(0).toUpperCase() + k.slice(1));
                        n[mapped] = obj[k] !== null ? obj[k] : '';
                    }
                    return n;
                });
            };

            const r = {
                sucesso: true,
                dados: {
                    Home_Config: mapKeys(hc.data),
                    Elite: mapKeys(el.data),
                    Promocoes: mapKeys(pr.data),
                    Dedicado: mapKeys(de.data),
                    Mapas: mapKeys(ma.data),
                    Cadastro: mapKeys(ca.data),
                    Procedimentos: mapKeys(pe.data)
                },
                temAcessoDashboard: isGestao, 
                urlDashboard: isGestao ? 'https://app.powerbi.com/view?r=eyJrIjoiNTEzMDg1ZmQtZjVkMi00OGFjLWE1NzQtNTJlZWU2ODYyNGNhIiwidCI6IjJlNDUwMmZiLWFmOTQtNDU1Yi05M2Y0LWIzNDU5MDMwY2UxNiJ9' : null, 
                temAcessoDashboardOperacional: !isGestao,
                urlDashboardOperacional: !isGestao ? 'https://app.powerbi.com/view?r=eyJrIjoiMTY4MzU3OTUtZjFjYS00YmYwLTk4NjgtN2RiNzE4YzMwNWY1IiwidCI6IjJlNDUwMmZiLWFmOTQtNDU1Yi05M2Y0LWIzNDU5MDMwY2UxNiJ9' : null
            };
            
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            renderFullSite(r);
            
            // Wait for the browser to FINISH parsing innerHTML (iframes can cause it to yield)
            var checkDOM = setInterval(function() {
                if (document.getElementById('cadastroGrid')) {
                    clearInterval(checkDOM);
                    integrarAbaNaSite(r.dados);
                }
            }, 50);
            
            // Failsafe if it never appears
            setTimeout(function() {
                clearInterval(checkDOM);
                if (!document.getElementById('cadastroGrid')) {
                    integrarAbaNaSite(r.dados);
                }
            }, 2500);
            
        } catch (error) {
            console.error('Erro ao carregar dados:', error);
            mostrarErro('Erro de conexão ao carregar dados.');
        }
    }

    window.addEventListener('load', async function() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            document.getElementById('login-container').style.display = 'none';
            var loader = document.getElementById('loader');
            loader.style.display = 'flex'; loader.style.opacity = '1';
            await carregarDadosCompletos();
        }
    });

    async function fazerLogin() {
        var usr = document.getElementById('loginUser').value;
        var pwd = document.getElementById('loginPass').value;
        if (!usr || !pwd) { mostrarErro('Preencha usuário e senha!'); return; }
        document.getElementById('login-error').style.display = 'none';
        var b = document.getElementById('btnEntrar');
        if(b){ b.disabled=true; document.getElementById('txtBtn').innerText='Sincronizando...'; document.getElementById('spinBtn').style.display='block'; }
        
        const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: usr,
            password: pwd,
        });

        if (error) {
            restaurarBotaoLogin();
            document.getElementById('loader').style.display = 'none';
            mostrarErro('Erro: ' + error.message);
        } else {
            document.getElementById('login-container').style.display = 'none';
            var loader = document.getElementById('loader');
            loader.style.display = 'flex'; loader.style.opacity = '1';
            await carregarDadosCompletos();
        }
    }

    function renderFullSite(respostaObj) {
        try {
            var dados = respostaObj.dados ? respostaObj.dados : respostaObj;
            dados.temAcessoDashboard = respostaObj.temAcessoDashboard || false;
            dados.urlDashboard = respostaObj.urlDashboard || null;
            dados.temAcessoDashboardOperacional = respostaObj.temAcessoDashboardOperacional || false;
            dados.urlDashboardOperacional = respostaObj.urlDashboardOperacional || null;

            var finalHTML = '';

            if (dados.Home_Config) {
                var hero = dados.Home_Config.find(function(i){ return i.Tipo==='Hero'; });
                if(hero) finalHTML += '<section id="home" class="hero"><div class="hero-content"><h1>'+hero.Titulo+' <span class="text-neon">GÔ</span></h1><p class="hero-subtitle">'+hero.Subtitulo+'</p><div class="hero-badge">Manual da Operação</div></div></section>';
                var cardsH = dados.Home_Config.filter(function(i){ return i.Tipo!=='Hero'; }).map(function(item){
                    return '<div class="glass-panel card-standard" style="align-items:center;text-align:center;"><div class="icon-glow">'+((item.Titulo||'').includes('Promo')?'🔥':'💬')+'</div><h3>'+item.Titulo+'</h3><p>'+item.Texto+'</p></div>';
                }).join('');
                if(cardsH) finalHTML += '<section><div class="grid-container">'+cardsH+'</div></section>';
            }

            if (dados.Elite) {
                var sections = dados.Elite.reduce(function(acc,item){
                    if(item.Tipo==='Hero_Elite') acc.push({header:item,cards:[]});
                    else if(acc.length>0) acc[acc.length-1].cards.push(item);
                    return acc;
                },[]);
                sections.forEach(function(sec){
                    finalHTML += '<section id="elite"><div class="section-header"><h2 class="section-title">'+sec.header.Titulo+' <span class="text-neon">Elite</span></h2><p class="section-desc">'+sec.header.Texto+'</p></div><div class="grid-container">';
                    sec.cards.forEach(function(c){
                        if(c.Tipo==='Card_Elite'){
                            var isScore=(c.Titulo||'').includes('Score');
                            finalHTML += '<div class="glass-panel card-standard"><div class="elite-card-header"><div class="icon-glow">'+(isScore?'🎯':'📦')+'</div><div><h3>'+c.Titulo+'</h3><p class="text-muted">'+c.Texto+'</p></div></div><div class="progress-container"><div class="progress-info"><span>Progresso</span><span class="text-neon">'+(isScore?'3/4 Semanas':'324/300')+'</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+(isScore?'75%':'100%')+'"></div></div></div></div>';
                        } else if(c.Tipo==='Acelerador'){
                            finalHTML += '<div class="glass-panel card-standard acelerador-card" style="grid-column:1/-1;"><div class="acelerador-badge">DESTAQUE</div><div style="display:flex;gap:16px;align-items:center;"><div class="icon-glow">⚡</div><div><h3>'+c.Titulo+'</h3><p class="text-muted">'+c.Texto+'</p></div></div><div class="equation-box"><b>📦 1 Pedido Dedicado</b> <span class="text-neon">➔</span> <span class="eq-result">= 2 Pedidos</span></div></div>';
                        } else if(c.Tipo==='Card_Destaque'){
                            var txtF = (c.Texto||'').replace(/\n|\r\n/g,'<br>');

    function integrarAbaNaSite(dadosParciais) {
        var nomes = Object.keys(dadosParciais);
        
        nomes.forEach(function(nome) {
            var dados = dadosParciais[nome];
            var isVazio = (!dados || dados.length===0);
            try {
                switch(nome) {
                    case 'Dedicado':
                        if (isVazio) {
                            var c = document.getElementById('dedicadoContent');
                            if(c) c.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Nenhum dado de frota encontrado.</p>';
                            return;
                        }
                        dadosDedicado = dados;
                        var cardsD2 = dados.filter(function(i){ return String(i.Tipo||'').toLowerCase() === 'card_dedicado'; });
                        modaisDisponiveis = [];
                        cardsD2.forEach(function(c){ var modal = c.Modal ? String(c.Modal).trim() : 'TODOS'; if(modaisDisponiveis.indexOf(modal)===-1) modaisDisponiveis.push(modal); });
                        var it2 = modaisDisponiveis.indexOf('TODOS');
                        if(it2>-1){ modaisDisponiveis.splice(it2,1); modaisDisponiveis.unshift('TODOS'); }
                        var selEl = document.getElementById('modalSelector');
                        if(selEl){ selEl.innerHTML = modaisDisponiveis.map(function(m,idx){ return '<button class="praca-btn modal-btn'+(idx===0?' active':'')+'" onclick="selecionarModal(this,\''+m.replace(/'/g,"\\'")+'\')">'+m+'</button>'; }).join(''); }
                        var subHD = dados.filter(function(i){ return String(i.Tipo||'').toLowerCase() === 'hero_dedicado'; });
                    var secDed = document.getElementById('dedicado');
                    if(secDed && subHD.length>0 && !secDed.querySelector('.grid-container')){
                        var shH = '<div class="grid-container" style="margin-bottom:48px;text-align:left;gap:36px;">';
                        subHD.forEach(function(sh){ shH += '<div><h3 style="color:var(--menta-viva);font-size:18px;font-weight:700;margin-bottom:10px;">'+(sh.Texto_Info||'')+'</h3><p class="text-muted" style="line-height:1.7;font-size:14px;">'+(sh.Horario_Valores||'')+'</p></div>'; });
                        shH += '</div>';
                        var secH = secDed.querySelector('.section-header');
                        if(secH) secH.insertAdjacentHTML('afterend',shH);
                    }
                    if(modaisDisponiveis.length>0) renderModalDedicado(modaisDisponiveis[0]);
                    else {
                        var c = document.getElementById('dedicadoContent');
                        if(c) c.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Nenhuma frota válida encontrada.</p>';
                    }
                    break;
                case 'Procedimentos':
                    var procBody = document.getElementById('procedimentosBody');
                    if(procBody){
                        if (isVazio) {
                            procBody.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Nenhum procedimento encontrado.</p>';
                        } else {
                            var phtml = _buildProcedimentosHTML(dados);
                            procBody.innerHTML = phtml || '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Nenhum procedimento válido encontrado.</p>';
                            var idle2 = window.requestIdleCallback ? function(fn){ requestIdleCallback(fn,{timeout:800}); } : function(fn){ setTimeout(fn,80); };
                            idle2(applyRevealClasses);
                        }
                    }
                    break;
                case 'Mapas':
                    if (isVazio) {
                        var mC = document.getElementById('mapasContent');
                        if(mC) mC.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Nenhum mapa encontrado.</p>';
                        return;
                    }
                    dadosMapas = dados;
                    pracasMapasDisponiveis = [];
                    dados.forEach(function(m){ if(m.Praca && pracasMapasDisponiveis.indexOf(m.Praca)===-1) pracasMapasDisponiveis.push(m.Praca); });
                    var lv1 = document.querySelector('.mapa-lv1-menu');
                    if(lv1 && pracasMapasDisponiveis.length>0){
                        lv1.innerHTML = _buildMapasMenuHTML();
                        var mapasC = document.getElementById('mapasContent');
                        if(mapasC) mapasC.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);font-size:14px;opacity:0.5;padding:24px 0;">Passe o mouse no menu acima para selecionar praça e região.</p>';
                    } else {
                        var mapasC = document.getElementById('mapasContent');
                        if(mapasC) mapasC.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Nenhum mapa configurado no banco.</p>';
                    }
                    break;
                case 'Cadastro':
                    var html = '';
                    try {
                        if (isVazio) {
                            html = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;grid-column:1/-1;">Nenhum status de cadastro encontrado.</p>';
                        } else {
                            html = _buildCadastroHTML(dados) || '<p style="text-align:center;color:var(--azul-gelo);padding:40px;grid-column:1/-1;">Nenhum status válido encontrado.</p>';
                        }
                    } catch (e) {
                        html = '<p style="color:#ff4b4b;padding:20px;grid-column:1/-1;background:rgba(255,0,0,0.1);border-radius:10px;">Erro interno ao gerar tabela: ' + e.message + '</p>';
                    }
                    
                    var cadGrid = document.getElementById('cadastroGrid');
                    var cadSec = document.getElementById('cadastro');
                    
                    if (cadGrid) {
                        cadGrid.innerHTML = html;
                    } else {
                        var cadSec = document.getElementById('cadastro');
                        if (cadSec) {
                            var ll = cadSec.querySelector('.lazy-loading-hint');
                            if(ll) ll.style.display = 'none';
                            cadSec.insertAdjacentHTML('beforeend', '<div class="grid-container" style="margin-top:20px;">' + html + '</div>');
                        } else {
                            var mc = document.getElementById('main-content');
                            if (mc) mc.insertAdjacentHTML('beforeend', '<section><div class="section-header"><h2 class="section-title">Status de <span class="text-neon">Cadastro</span></h2></div><div class="grid-container">' + html + '</div></section>');
                        }
                    }
                    break;
                case 'Metricas':
                    if(!isVazio && dados.length > 0){
                        dadosMetricas = dados;
                        var pracasMetricas = [];
                        dadosMetricas.forEach(function(m){ if(m.Praca && pracasMetricas.indexOf(m.Praca)===-1) pracasMetricas.push(m.Praca); });
                        var selectM = document.getElementById('metricasPracaSelect');
                        if(selectM){
                            var optsM = '<option value="TODAS">Todas as Praças</option>';
                            pracasMetricas.forEach(function(p){ optsM += '<option value="'+p+'">'+p+'</option>'; });
                            selectM.innerHTML = optsM;
                        }
                        renderMetricas();
                    } else {
                         var metC = document.getElementById('metricasContent');
                         if(metC) metC.innerHTML = '<p style="text-align:center;color:var(--azul-gelo);padding:40px;">Métricas vazias.</p>';
                    }
                    break;
                }
            } catch (err) {
                console.error("Erro ao integrar aba: " + nome, err);
                if (nome === 'Cadastro') {
                    var cG = document.getElementById('cadastroGrid');
                    if(cG) cG.innerHTML = '<p style="color:#ff4b4b;padding:20px;grid-column:1/-1;">Erro Crítico no Cadastro: ' + err.message + '<br>' + err.stack + '</p>';
                } else if (nome === 'Dedicado') {
                    var dG = document.getElementById('dedicadoContent');
                    if(dG) dG.innerHTML = '<p style="color:#ff4b4b;padding:20px;">Erro Crítico na Frota: ' + err.message + '</p>';
                }
            }
        });
    }

    /* ============================================================
       FIX 1: atualizarMetricas — só recarrega dados de métricas,
       sem recriar o DOM nem causar scroll jump
    ============================================================ */
    async function atualizarMetricas(btn) {
        if(btn){ btn.classList.add('loading'); btn.innerHTML='<span style="display:inline-block;animation:spin 0.8s linear infinite;">↻</span> Atualizando...'; }
        try {
            const { data, error } = await supabaseClient.from('metricas').select('*');
            if (error) throw error;
            if (data) integrarAbaNaSite({ Metricas: data });
            if(btn){ btn.classList.remove('loading'); btn.innerHTML='↻ Atualizar'; }
            showToast('Métricas atualizadas!','success',2000);
        } catch(error) {
            console.error(error);
            if(btn){ btn.classList.remove('loading'); btn.innerHTML='↻ Atualizar'; }
            showToast('Erro ao atualizar. Tente novamente.','error');
        }
    }

    var _autoRefreshTimer=null, _autoRefreshMinutos=0;
    function configurarAutoRefresh(val) {
        if(_autoRefreshTimer){ clearInterval(_autoRefreshTimer); _autoRefreshTimer=null; }
        var status=document.getElementById('autoRefreshStatus');
        if(!val||val==='0'||val==='off'){ _autoRefreshMinutos=0; if(status) status.style.opacity='0'; return; }
        var novoMin=Number(val); _autoRefreshMinutos=novoMin;
        if(status){ status.textContent='● a cada '+novoMin+'min'; status.style.opacity='1'; }
        /* auto-refresh também usa atualizarMetricas — sem scroll jump */
        _autoRefreshTimer=setInterval(function(){ atualizarMetricas(null); },novoMin*60*1000);
    }

    /* ============================================================
       HELPERS DE BUILD
    ============================================================ */
    function _buildProcedimentosHTML(dados) {
        var secoes = {};
        dados.forEach(function(item){ 
            var sec=item.Secao||'geral'; 
            if(!secoes[sec]) secoes[sec]=[]; 
            secoes[sec].push(item); 
        });

        // Convertido para map/join com Template Literals 
        return Object.keys(secoes).map(function(secao){
            return secoes[secao].map(function(item){
                var tipo = String(item.Tipo||'').toLowerCase();
                
                if (tipo === 'header') { 
                    return `<div class="proc-intro"><strong>${item.Titulo}</strong><br>${item.Texto||''}</div>`;
                } else if (tipo === 'card') {
                    var linhas = (item.Texto||'').split('\n').filter(function(l){ return l.trim(); });
                    var listaH = linhas.map(l => `<li>${l.replace(/^[✔✓•\-]\s*/,'')}</li>`).join('');
                    var imgH = item.Imagem_URL ? `<img src="${item.Imagem_URL}" loading="lazy" style="width:auto;height:auto;max-height:380px;max-width:35%;object-fit:contain;border-radius:12px;flex-shrink:0;cursor:zoom-in;transition:transform 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.2);margin:auto 0;" onclick="abrirZoom(this);event.stopPropagation();" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">` : '';
                    
                    return `
                        <div class="accordion-item" onclick="toggleAccordion(this)" tabindex="0" onkeypress="if(event.key === 'Enter') toggleAccordion(this)">
                            <div class="accordion-header">
                                <div class="accordion-title-box">
                                    <h3>${item.Titulo}</h3>
                                    ${item.Subtitulo ? `<p>${item.Subtitulo}</p>` : ''}
                                </div>
                                <div class="accordion-arrow">▼</div>
                            </div>
                            <div class="accordion-body">
                                <div style="display:flex;gap:20px;align-items:center;justify-content:space-between;flex-wrap:wrap;">
                                    <div style="flex:1;min-width:0;"><ul>${listaH}</ul></div>
                                    ${imgH}
                                </div>
                            </div>
                        </div>`;
                } else if (tipo === 'alerta') { 
                    return `<div class="accordion-alert"><strong>${item.Subtitulo||'⚠️ Atenção'}:</strong> ${item.Texto||''}</div>`;
                } else if (tipo === 'destaque') {
                    var linhasD=(item.Texto||'').split('\n').filter(function(l){ return l.trim(); });
                    var linhasHTML = linhasD.map(l => `<p>${l}</p>`).join('');
                    return `

                            ${item.Subtitulo ? `<p style="margin-bottom:12px;color:var(--branco);">${item.Subtitulo}</p>` : ''}
                            ${linhasHTML}

                    return `<p style="text-align:center;color:var(--azul-gelo);margin:22px 0;font-size:14px;line-height:1.7;">${item.Texto||''}</p>`;

                return '';
            }).join('');

    function renderMetricas() {
        var container = document.getElementById('metricasContent');
        if(!container||!dadosMetricas||dadosMetricas.length===0) return;
        var selectPraca=document.getElementById('metricasPracaSelect');
        var pracaSel=selectPraca?selectPraca.value:'TODAS';
        var horarios=dadosMetricas.map(function(m){ return m.Horario||''; });
        horarios.sort();
        var ultimoHorario=horarios[horarios.length-1];
        var hrDisplay=ultimoHorario?ultimoHorario.toString().replace('T',' ').substring(0,16):'-';
        var itens=dadosMetricas.filter(function(m){ return m.Horario===ultimoHorario; });
        if(pracaSel!=='TODAS') itens=itens.filter(function(m){ return m.Praca===pracaSel; });
        function pctNum(v,t){ return t?Math.round(v/t*100):0; }
        function pctStr(v,t){ return t?(v/t*100).toFixed(1)+'%':'0%'; }
        var pracasPresentes=[];
        itens.forEach(function(m){ if(m.Praca&&pracasPresentes.indexOf(m.Praca)===-1) pracasPresentes.push(m.Praca); });
        var gTrab=0,gDisp=0,gOff=0,gPausa=0,gBloq=0,gTotal=0;
        itens.filter(function(m){ return (m.Subpraca||'').toUpperCase()==='GERAL'; }).forEach(function(m){ gTrab+=Number(m.Trabalhando)||0;gDisp+=Number(m.Disponiveis)||0;gOff+=Number(m.Offline)||0;gPausa+=Number(m['Em Pausa'])||0;gBloq+=Number(m.Bloqueados)||0;gTotal+=Number(m.Total)||0; });
        var CORES={trab:'#2CEABC',disp:'#2C67EA',off:'#B4E4FF',pausa:'#B4FFED',bloq:'#009B7F'};
        var html='';
        html+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;"><span style="font-size:11px;font-weight:700;color:var(--azul-gelo);opacity:0.5;letter-spacing:0.5px;">📡 Snapshot: '+hrDisplay+'</span><div style="display:flex;gap:16px;flex-wrap:wrap;">';
        [{c:CORES.trab,l:'Trabalhando'},{c:CORES.disp,l:'Disponível'},{c:CORES.off,l:'Offline'},{c:CORES.pausa,l:'Em Pausa'},{c:CORES.bloq,l:'Bloqueado'}].forEach(function(d){ html+='<span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--azul-gelo);opacity:0.65;"><span style="width:8px;height:8px;border-radius:50%;background:'+d.c+'"></span>'+d.l+'</span>'; });
        html+='</div></div>';
        var kpiG=[{l:'Total Frota',v:gTotal,c:'var(--azul-gelo)',sub:'entregadores'},{l:'Trabalhando',v:gTrab,c:CORES.trab,sub:pctStr(gTrab,gTotal)+' do total'},{l:'Disponíveis',v:gDisp,c:CORES.disp,sub:pctStr(gDisp,gTotal)+' do total'},{l:'Offline',v:gOff,c:CORES.off,sub:pctStr(gOff,gTotal)+' do total'},{l:'Em Pausa',v:gPausa,c:CORES.pausa,sub:pctStr(gPausa,gTotal)+' do total'},{l:'Bloqueados',v:gBloq,c:CORES.bloq,sub:pctStr(gBloq,gTotal)+' do total'}];
        html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:28px;">';
        kpiG.forEach(function(k){ var iT=k.l==='Trabalhando'; var bd=iT?'border-color:rgba(44,234,188,0.45);box-shadow:0 0 20px rgba(44,234,188,0.08);':''; html+='<div style="background:rgba(13,20,65,0.6);border:1px solid rgba(44,234,188,0.1);'+bd+'border-radius:16px;padding:16px 18px;position:relative;overflow:hidden;"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:'+k.c+';border-radius:2px 2px 0 0;opacity:0.7;"></div><div style="font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--azul-gelo);opacity:0.5;margin-bottom:8px;">'+k.l+'</div><div style="font-size:32px;font-weight:800;color:'+k.c+';line-height:1;letter-spacing:-1px;margin-bottom:4px;">'+k.v+'</div><div style="font-size:11px;font-weight:600;color:var(--azul-gelo);opacity:0.45;">'+k.sub+'</div>'+(k.l!=='Total Frota'&&gTotal>0?'<div style="margin-top:10px;height:3px;background:rgba(255,255,255,0.06);border-radius:99px;overflow:hidden;"><div style="height:100%;width:'+pctNum(k.v,gTotal)+'%;background:'+k.c+';border-radius:99px;"></div></div>':'')+'</div>'; });
        html+='</div>';
        if(gTotal>0){
            var gS=[{v:gTrab,c:CORES.trab,l:'Trab.'},{v:gDisp,c:CORES.disp,l:'Disp.'},{v:gOff,c:CORES.off,l:'Offline'},{v:gPausa,c:CORES.pausa,l:'Pausa'},{v:gBloq,c:CORES.bloq,l:'Bloq.'}];
            html+='<div style="margin-bottom:32px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--azul-gelo);opacity:0.4;">Distribuição global</span><span style="font-size:11px;font-weight:700;color:var(--menta-viva);">'+pracasPresentes.length+' praça'+(pracasPresentes.length>1?'s':'')+'</span></div><div style="display:flex;margin-bottom:4px;">';

            gS.forEach(function(s){ if(s.v>0) html+='<div style="width:'+pctNum(s.v,gTotal)+'%;background:'+s.c+';transition:width 0.7s ease;" title="'+s.l+': '+s.v+'"></div>'; });
            html+='</div></div>';
        }
        function rankPraca(p){ var iP=itens.filter(function(m){ return m.Praca===p; }); var gR=iP.filter(function(m){ return (m.Subpraca||'').toUpperCase()==='GERAL'; })[0]; var t=gR?Number(gR.Trabalhando)||0:0; var tt=gR?Number(gR.Total)||0:0; var pct=pctNum(t,tt); return pct>=40?0:pct>=20?1:2; }
        pracasPresentes.sort(function(a,b){ var ra=rankPraca(a),rb=rankPraca(b); if(ra!==rb) return ra-rb; var ga=itens.filter(function(m){ return m.Praca===a&&(m.Subpraca||'').toUpperCase()==='GERAL'; })[0]; var gb=itens.filter(function(m){ return m.Praca===b&&(m.Subpraca||'').toUpperCase()==='GERAL'; })[0]; return (Number(gb&&gb.Total)||0)-(Number(ga&&ga.Total)||0); });

            var subs=iP.filter(function(m){ return (m.Subpraca||'').toUpperCase()!=='GERAL'; });
            var trab=gR?Number(gR.Trabalhando)||0:0,disp=gR?Number(gR.Disponiveis)||0:0,off=gR?Number(gR.Offline)||0:0,pausa=gR?Number(gR['Em Pausa'])||0:0,bloq=gR?Number(gR.Bloqueados)||0:0,tot=gR?Number(gR.Total)||0:0;

            var pTxt=pctT>=40?'Alta':pctT>=20?'Mediana':'Baixa';
            html+='<div class="praca-metrica-card"><div class="praca-card-header"><div><div class="praca-card-title">'+praca+'</div>'+(gR&&gR.Regiao&&gR.Regiao!==praca?'<div style="font-size:10px;color:var(--azul-gelo);opacity:0.4;font-weight:600;margin-top:2px;">'+gR.Regiao+'</div>':'')+'</div><div style="display:flex;align-items:center;gap:8px;"><span class="metricas-pill '+pCls+'">'+pTxt+'</span><span class="praca-card-total">'+tot+'</span></div></div>';

            if(!pontos[lbl]) pontos[lbl]={sum:0,count:0};
            pontos[lbl].sum+=total; pontos[lbl].count+=1;
        });
        var labels=Object.keys(pontos).sort();

        function formatLbl(lbl){ if(filtroDia==='dia') return lbl; var tp=lbl.substring(11,16); var d=parseInt(lbl.substring(8,10)); var m2=parseInt(lbl.substring(5,7)); var du={}; labels.forEach(function(l2){ du[l2.substring(0,10)]=1; }); return Object.keys(du).length>1?(d+'/'+m2+' '+tp):tp; }

        for(var gi=0;gi<=4;gi++){ var gy=pT+(gH/4)*gi; var gv=Math.round(maxV-(maxV/4)*gi); svg+='<line x1="'+pL+'" y1="'+gy+'" x2="'+(pL+gW)+'" y2="'+gy+'" stroke="rgba(180,228,255,0.06)" stroke-width="1"/>'; svg+='<text x="'+(pL-6)+'" y="'+(gy+4)+'" text-anchor="end" font-size="9" fill="rgba(180,228,255,0.35)" font-family="Plus Jakarta Sans,system-ui,sans-serif">'+gv+'</text>'; }
        var aP='M '+px(0)+' '+(pT+gH)+' L '+px(0)+' '+py(valores[0]);
        for(var i2=1;i2<n;i2++){ var cx1=px(i2-1)+step*0.45; var cx2=px(i2)-step*0.45; aP+=' C '+cx1+' '+py(valores[i2-1])+', '+cx2+' '+py(valores[i2])+', '+px(i2)+' '+py(valores[i2]); }
        aP+=' L '+px(n-1)+' '+(pT+gH)+' Z';
        var lP='M '+px(0)+' '+py(valores[0]);
        for(var i3=1;i3<n;i3++){ var lx1=px(i3-1)+step*0.45; var lx2=px(i3)-step*0.45; lP+=' C '+lx1+' '+py(valores[i3-1])+', '+lx2+' '+py(valores[i3])+', '+px(i3)+' '+py(valores[i3]); }
        var gId='hg'+Date.now();
        svg+='<defs><linearGradient id="'+gId+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2CEABC" stop-opacity="0.28"/><stop offset="100%" stop-color="#2CEABC" stop-opacity="0.01"/></linearGradient></defs>';

        var mLE=Math.ceil(n/12);

    }

    };

    /* Shake + Sucesso */
    function mostrarSucesso(){ var box=document.getElementById('loginBox'); var logo=document.getElementById('loginLogo'); var icon=document.getElementById('login-success-icon'); var fields=box?box.querySelectorAll('.login-field,.login-remember,.login-btn,h2,.login-subtitle'):[]; if(!box) return; fields.forEach(function(el){ el.style.display='none'; }); if(logo) logo.style.display='none'; if(icon) icon.style.display='block'; }
    var _baseRFS2=renderFullSite;
    renderFullSite=function(r){ mostrarSucesso(); setTimeout(function(){ _baseRFS2(r); },600); };

    /* Keyboard */
    document.addEventListener('keydown',function(e){
        if(e.key==='Escape'){ _zoomScale=1; document.getElementById('imgModal').classList.remove('active'); var nav=document.getElementById('mobileNav'); var btn=document.getElementById('hamburgerBtn'); if(nav) nav.classList.remove('open'); if(btn) btn.classList.remove('open'); }
        if(e.key==='/'&&document.activeElement.tagName!=='INPUT'&&document.activeElement.tagName!=='TEXTAREA'){ e.preventDefault(); var si=document.getElementById('searchInput'); if(si){ si.focus(); si.select(); } }
        if(e.key==='Enter'){ var lc=document.getElementById('login-container'); if(lc&&lc.style.display!=='none') fazerLogin(); }
    });

    /* RIPPLE */
    document.addEventListener('click',function(e){ var host=e.target.closest('.ripple-host'); if(!host) return; var rect=host.getBoundingClientRect(); var wave=document.createElement('span'); wave.className='ripple-wave'; wave.style.left=(e.clientX-rect.left)+'px'; wave.style.top=(e.clientY-rect.top)+'px'; host.appendChild(wave); setTimeout(function(){ wave.remove(); },600); });

    /* FIX 2: MENU INDICATOR — section spy respeita .menu-gestao-link sem travar */
    (function(){
        var indicator=document.getElementById('menuIndicator');
        var menu=document.getElementById('mainMenu');
        if(!indicator||!menu) return;
        function moveTo(el){ var mr=menu.getBoundingClientRect(); var lr=el.getBoundingClientRect(); indicator.style.width=lr.width+'px'; indicator.style.height=lr.height+'px'; indicator.style.transform='translate('+(lr.left-mr.left)+'px,'+(lr.top-mr.top)+'px)'; indicator.style.opacity='1'; }
        menu.querySelectorAll('a').forEach(function(a){ a.addEventListener('mouseenter',function(){ moveTo(a); }); });
        menu.addEventListener('mouseleave',function(){
            var ac=menu.querySelector('a.active-link');
            /* FIX: não mova o indicator para links de gestão ao sair — apenas oculta se não há ativo real */
            if(ac && !ac.classList.contains('menu-gestao-link')) moveTo(ac);
            else indicator.style.opacity='0';
        });
        var sections=[]; var links=[];
        function buildMap(){ sections=[]; links=[]; menu.querySelectorAll('a[href^="#"]').forEach(function(a){ var id=a.getAttribute('href').slice(1); var sec=document.getElementById(id); if(sec){ sections.push(sec); links.push(a); } }); }
        var spyTick=false;
        window.addEventListener('scroll',function(){
            if(spyTick) return; spyTick=true;
            requestAnimationFrame(function(){
                spyTick=false;
                var hH=80; var cur=null;
                for(var i=sections.length-1;i>=0;i--){ if(sections[i].getBoundingClientRect().top<=hH+40){ cur=links[i]; break; } }
                /* FIX: remove active-link de todos, incluindo gestão, antes de reaplicar */
                links.forEach(function(l){ l.classList.remove('active-link'); });
                if(cur){ cur.classList.add('active-link'); moveTo(cur); } else { indicator.style.opacity='0'; }
            });
        },{passive:true});
        var _bF=renderFullSite;
        renderFullSite=function(r){ _bF(r); setTimeout(buildMap,400); };
    })();
    </script>
</body>
</html>
